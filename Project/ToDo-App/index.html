<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ToDo-App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2>My To-Do List</h2>
    <input id="searchInput" placeholder="Search task...">
    <input type="text" placeholder="What do you want to do today?" id="taskInput">
    <button type="button" id="addBtn" class="button">
        Add Task
    </button>
    <button id="delAllBtn">
        Delete All
    </button>
    <p id="taskCount">Total Tasks: 0</p>
    <p id="emptyMessage">
    No tasks yet. Add your first task!
    </p>
    <ul id="taskList">
    
    </ul>
    </div>
     <script src="script.js"></script>
</body>
</html>
